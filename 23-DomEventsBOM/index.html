<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <section class="calc-box">
        <h3 class="calc-title">Riyazi Əməliyyat</h3>
        
        <div class="fields-wrapper">
            <input type="number" class="val-input" id="firstVal" placeholder="Rəqəm 1">
            <input type="number" class="val-input" id="secondVal" placeholder="Rəqəm 2">
        </div>

        <div class="ops-grid">
            <button class="op-btn" data-op="add">+</button>
            <button class="op-btn" data-op="sub">-</button>
            <button class="op-btn" data-op="mul">×</button>
            <button class="op-btn" data-op="div">÷</button>
        </div>

        <div class="output-panel">
            <p>Yekun: <strong id="finalResult">0</strong></p>
        </div>
    </section>

    <script src="assets/script.js"></script>
</body>
</html>
