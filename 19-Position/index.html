<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce | Collection List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Naviqasiya blokunun adlarını və strukturunu yenilədik -->
    <header class="main-header">
        <div class="header-wrapper">
            <div class="site-logo">MODERN<span>SHOP</span></div>
            <nav class="navigation-bar">
                <ul class="nav-list">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Collections</a></li>
                    <li><a href="#">New Arrivals</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
            <div class="user-tools">
                <span class="search-trigger">Search</span>
            </div>
        </div>
    </header>

    <main class="page-container">
        <div class="listing-utility">
            <div class="sorting-options">Sort by: <strong>Default</strong></div>
        </div>

        <div class="product-inventory">
            
            <div class="inventory-item">
                <figure class="thumb-wrapper">
                    <span class="offer-label">SALE</span>
                    <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&w=400&q=80" alt="Jacket Product">
                </figure>
                <div class="item-details">
                    <h3 class="item-heading">Piqué Biker Jacket</h3>
                    <div class="star-rating highlight">★★★★★</div>
                    <div class="price-tag">$67.24</div>
                </div>
            </div>

            
            <div class="inventory-item">
                <figure class="thumb-wrapper">
                    <img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?auto=format&fit=crop&w=400&q=80" alt="Bag Product">
                </figure>
                <div class="item-details">
                    <h3 class="item-heading">Multi-pocket Chest Bag</h3>
                    <div class="star-rating highlight">★★★★☆</div>
                    <div class="price-tag">$43.48</div>
                </div>
            </div>

            <!-- Məhsul 3 -->
            <div class="inventory-item">
                <figure class="thumb-wrapper">
                    <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&w=400&q=80" alt="T-shirt Product">
                </figure>
                <div class="item-details">
                    <h3 class="item-heading">Diagonal Textured Tee</h3>
                    <div class="star-rating">☆☆☆☆☆</div>
                    <div class="price-tag">$60.90</div>
                </div>
            </div>

            
            
        </div>

        
        <div class="pager-control">
            <button class="pager-link current">1</button>
            <button class="pager-link">2</button>
            <button class="pager-link">3</button>
            <span class="pager-gap">...</span>
            <button class="pager-link">21</button>
        </div>
    </main>

</body>
</html>
